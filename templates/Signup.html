<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BlueCarbon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/apple.css') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apple: { bg: '#FFFFFF', section: '#F5F5F7', text: '#1D1D1F', secondary: '#86868B', accent: '#0071E3' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-apple-section font-['Inter'] text-apple-text min-h-screen flex items-center justify-center p-6">
    <div class="reveal w-full max-w-lg">
        <div class="apple-card shadow-2xl bg-white !p-10">
            <div class="text-center mb-10">
                <div
                    class="w-16 h-16 bg-apple-accent rounded-3xl flex items-center justify-center shadow-lg shadow-apple-accent/20 mx-auto mb-6">
                    <i class="fas fa-leaf text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight">Create Your Account.</h1>
                <p class="text-apple-secondary font-medium mt-2">Join the future of ecological assets.</p>
            </div>

            <form action="{{ url_for('signup') }}" method="POST" class="space-y-6">
                <div>
                    <label
                        class="block text-[10px] font-black text-apple-secondary uppercase tracking-widest mb-2 px-2">Role</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="farmer" class="hidden peer" checked>
                            <div
                                class="p-4 border border-black/5 rounded-2xl text-center peer-checked:border-apple-accent peer-checked:bg-apple-accent/5 transition-all">
                                <i
                                    class="fas fa-tractor block mb-2 text-xl text-apple-secondary peer-checked:text-apple-accent"></i>
                                <span class="text-xs font-bold uppercase tracking-widest">Farmer</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="company" class="hidden peer">
                            <div
                                class="p-4 border border-black/5 rounded-2xl text-center peer-checked:border-apple-accent peer-checked:bg-apple-accent/5 transition-all">
                                <i
                                    class="fas fa-building block mb-2 text-xl text-apple-secondary peer-checked:text-apple-accent"></i>
                                <span class="text-xs font-bold uppercase tracking-widest">Company</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-black text-apple-secondary uppercase tracking-widest mb-2 px-2">Email
                        Address</label>
                    <input type="email" name="email" required placeholder="name@domain.com"
                        class="w-full p-4 bg-apple-section border border-black/5 rounded-2xl text-apple-text focus:ring-2 focus:ring-apple-accent outline-none transition-all">
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black text-apple-secondary uppercase tracking-widest mb-2 px-2">Password</label>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="w-full p-4 bg-apple-section border border-black/5 rounded-2xl text-apple-text focus:ring-2 focus:ring-apple-accent outline-none transition-all">
                </div>

                <button type="submit"
                    class="apple-btn-primary w-full py-5 justify-center !text-sm shadow-xl shadow-apple-accent/20">
                    Create Account
                </button>
            </form>

            <div class="mt-10 pt-10 border-t border-black/5 text-center">
                <p class="text-xs text-apple-secondary font-medium">
                    Already have an account? <a href="{{ url_for('login') }}"
                        class="text-apple-accent font-black hover:underline">Log In</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
