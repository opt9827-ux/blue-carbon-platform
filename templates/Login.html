<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Node | BlueCarbon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            position: relative;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6 text-slate-200">
    <!-- Ambient Glow -->
    <div class="glow-sphere w-[500px] h-[500px] bg-emerald-500/10 -top-48 -left-48"></div>
    <div class="glow-sphere w-[500px] h-[500px] bg-indigo-500/10 -bottom-48 -right-48"></div>

    <div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-8 duration-700">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-3xl shadow-2xl shadow-emerald-500/20 mb-6 group cursor-pointer hover:rotate-12 transition-transform">
                <i class="fas fa-leaf text-white text-3xl"></i>
            </div>
            <h1 class="text-4xl font-black text-white uppercase italic tracking-tighter mb-2">Connect Node</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Accessing Blue Carbon Registry
                Gateway</p>
        </div>

        <div class="glass p-10 rounded-[2.5rem] shadow-2xl border-white/5">
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div
                class="mb-8 p-4 rounded-xl bg-red-500/10 text-red-400 text-xs font-bold border border-red-500/20 flex items-center gap-3 animate-pulse">
                <i class="fas fa-satellite-dish"></i> {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-8">
                <div>
                    <label
                        class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-1">Terminal
                        ID (Email)</label>
                    <div class="relative group">
                        <i
                            class="fas fa-at absolute left-5 top-1/2 -translate-y-1/2 text-slate-600 group-focus-within:text-emerald-500 transition-colors"></i>
                        <input type="email" name="email" required placeholder="name@telemetry.net"
                            class="w-full pl-14 pr-6 py-5 bg-slate-900/50 border border-white/5 rounded-2xl text-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all placeholder:text-slate-700 font-medium">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-1">Access
                        Key</label>
                    <div class="relative group">
                        <i
                            class="fas fa-key absolute left-5 top-1/2 -translate-y-1/2 text-slate-600 group-focus-within:text-emerald-500 transition-colors"></i>
                        <input type="password" name="password" required placeholder="••••••••"
                            class="w-full pl-14 pr-6 py-5 bg-slate-900/50 border border-white/5 rounded-2xl text-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all placeholder:text-slate-700 font-medium">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full py-5 bg-gradient-to-br from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-black uppercase tracking-[0.2em] text-sm rounded-2xl shadow-xl shadow-emerald-500/20 transform hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                        Sync Node <i class="fas fa-chevron-right text-[10px] opacity-50"></i>
                    </button>
                </div>
            </form>

            <div class="mt-10 pt-10 border-t border-white/5 text-center">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">
                    Unregistered Node?
                    <a href="{{ url_for('signup') }}"
                        class="text-emerald-500 hover:text-emerald-400 transition-colors underline decoration-emerald-500/30 underline-offset-4">Initialize
                        Identity</a>
                </p>
            </div>
        </div>

        <p class="text-center mt-10 text-[10px] font-black text-slate-600 uppercase tracking-[0.3em]">Encrypted P2P MRV
            Protocol v2.8</p>
    </div>
</body>

</html>
