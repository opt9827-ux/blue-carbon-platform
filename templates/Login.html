<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BlueCarbon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/apple.css') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apple: { bg: '#FFFFFF', section: '#F5F5F7', text: '#1D1D1F', secondary: '#86868B', accent: '#0071E3' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-apple-section font-['Inter'] text-apple-text h-screen flex items-center justify-center p-6">
    <div class="reveal w-full max-w-md">
        <div class="apple-card shadow-2xl bg-white !p-10">
            <div class="text-center mb-10">
                <div
                    class="w-16 h-16 bg-apple-accent rounded-3xl flex items-center justify-center shadow-lg shadow-apple-accent/20 mx-auto mb-6">
                    <i class="fas fa-leaf text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight">Welcome Back.</h1>
                <p class="text-apple-secondary font-medium mt-2">Log in to manage your carbon assets.</p>
            </div>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div
                class="mb-6 p-4 bg-red-500/5 border border-red-500/10 text-red-500 rounded-2xl text-xs font-bold text-center italic">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
                <div>
                    <label
                        class="block text-[10px] font-black text-apple-secondary uppercase tracking-widest mb-2 px-2">Email
                        Address</label>
                    <input type="email" name="email" required placeholder="name@company.com"
                        class="w-full p-4 bg-apple-section border border-black/5 rounded-2xl text-apple-text focus:ring-2 focus:ring-apple-accent outline-none transition-all placeholder:text-apple-text/20">
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black text-apple-secondary uppercase tracking-widest mb-2 px-2">Password</label>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="w-full p-4 bg-apple-section border border-black/5 rounded-2xl text-apple-text focus:ring-2 focus:ring-apple-accent outline-none transition-all placeholder:text-apple-text/20">
                </div>
                <button type="submit"
                    class="apple-btn-primary w-full py-5 justify-center !text-sm shadow-xl shadow-apple-accent/20">
                    Sign In
                </button>
            </form>

            <div class="mt-10 pt-10 border-t border-black/5 text-center">
                <p class="text-xs text-apple-secondary font-medium">
                    New to BlueCarbon? <a href="{{ url_for('signup') }}"
                        class="text-apple-accent font-black hover:underline">Create an account</a>
                </p>
            </div>
        </div>
        <p class="text-center text-[10px] text-apple-secondary font-bold uppercase tracking-widest mt-10">
            &copy; 2026 BlueCarbon Platform
        </p>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
